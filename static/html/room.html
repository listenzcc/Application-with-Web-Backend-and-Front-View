<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Guides</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">

    <style>
        body {
            margin: 0;
            padding: 0;
        }

        #room {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 800px;
            height: 800px;
            z-index: 10;
            overflow: clip;
        }

        .click-through {
            pointer-events: none;
        }

        #runningDiv {
            font-size: small;
            color: brown;
            display: block;
        }

        #frameSelectionSpan {
            font-size: small;
            color: white;
            background-color: #0003;
        }

        ol {
            max-height: 400px;
            overflow-y: scroll;
            overflow-x: clip;
        }
    </style>
</head>

<body>
    <div>
        <div id="room"></div>
        <div id="overlap" class="click-through" style="z-index:100; position: fixed">
        </div>
        <div id="simulation" class="click-through" style="z-index:200; position: fixed">
        </div>
    </div>
    <div style="z-index: 200; position: absolute">
        <!-- Options for session frames -->
        <span id="frameSelectionSpan" style="position: fixed; right: 0"></span>
        <select id="frameSelection" style="display:none">
        </select>
        <div id="runningDiv">
            <span id="runningDivSpan"></span>
            <ol id="runningDivOl">
            </ol>
        </div>
    </div>

    <!-- Urls -->
    <script>
        const sessionStr = "{{session}}";
        const sessionApiUrl = `/get_fds_simulation_result/${sessionStr}`;
        const sessionFrameApiUrl = (frame) => {
            return `/get_fds_simulation_frame?session=${sessionStr}&frame=${frame}`;
        }

    </script>

    <!-- functions -->
    <script>
        // drawRoom
        function drawRoom(canvas) {
            const ctx = canvas.getContext('2d'),
                { width, height } = canvas;

            console.log(canvas, ctx, width, height)

            // Draw the background image of the room
            {
                const image = new Image();
                image.src = '/static/img/room.webp'
                image.onload = () => {
                    ctx.drawImage(image, 0, 0, canvas.width, canvas.height)
                }
            }

            ctx.fillStyle = '#f0f0f0'
            ctx.rect(0, 0, width, height)
            ctx.fill()
        }


        /**
         * 独立函数：从指定API获取传感器数据并绘制到指定canvas上
         * @param {string} apiUrl - 传感器数据API地址
         * @param {HTMLCanvasElement} canvas - 要绘制的canvas元素
         * @param {Object} customStyles - 自定义样式（可选）
         * @returns {Promise<Array>} 返回传感器数据数组
         */
        async function drawSensorsOnCanvas(apiUrl, canvas, customStyles = {}) {
            // 验证参数
            if (!canvas || !(canvas instanceof HTMLCanvasElement)) {
                throw new Error('有效的canvas元素是必需的');
            }

            try {
                // 1. 获取传感器数据
                const response = await fetch(apiUrl);
                if (!response.ok) {
                    throw new Error(`HTTP错误: ${response.status}`);
                }

                const sensors = await response.json();

                // 2. 获取canvas上下文
                const ctx = canvas.getContext('2d');
                if (!ctx) {
                    throw new Error('无法获取canvas上下文');
                }

                // 3. 合并默认样式和自定义样式
                const defaultStyles = {
                    humidity: {
                        color: 'rgba(65, 105, 225, 0.8)',
                        radius: 8,
                        borderColor: 'rgba(30, 144, 255, 1)',
                        labelColor: 'black'
                    },
                    temp: {
                        color: 'rgba(220, 20, 60, 0.8)',
                        radius: 10,
                        borderColor: 'rgba(255, 69, 0, 1)',
                        labelColor: 'black'
                    },
                    default: {
                        color: 'rgba(50, 205, 50, 0.8)',
                        radius: 8,
                        borderColor: 'rgba(34, 139, 34, 1)',
                        labelColor: 'black'
                    },
                    fontSize: 12,
                    fontFamily: 'Arial'
                };

                const styles = { ...defaultStyles, ...customStyles };

                // 4. 清除canvas
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // 5. 绘制每个传感器
                sensors.forEach(sensor => {
                    const sensorId = sensor.sensor_id.toLowerCase();
                    let type = 'default';

                    if (sensorId.includes('humidity')) {
                        type = 'humidity';
                    } else if (sensorId.includes('temp')) {
                        type = 'temp';
                    }

                    const style = styles[type] || styles.default;
                    drawSensor(ctx, canvas.width * sensor.x_position, canvas.height * sensor.y_position, sensor, style, styles.fontSize, styles.fontFamily)
                });

                // 6. 返回传感器数据供进一步使用
                return sensors;

            } catch (error) {
                console.error('绘制传感器数据失败:', error);
                throw error;
            }
        }

        /**
         * 绘制单个传感器点的具体实现
         */
        function drawSensor(ctx, x, y, sensor, style, fontSize, fontFamily) {
            // 绘制外圆边框
            ctx.beginPath();
            ctx.arc(x, y, style.radius + 2, 0, Math.PI * 2);
            ctx.fillStyle = style.borderColor;
            ctx.fill();

            // 绘制内圆主体
            ctx.beginPath();
            ctx.arc(x, y, style.radius, 0, Math.PI * 2);
            ctx.fillStyle = style.color;
            ctx.fill();

            // 绘制中心点
            ctx.beginPath();
            ctx.arc(x, y, style.radius / 3, 0, Math.PI * 2);
            ctx.fillStyle = 'white';
            ctx.fill();

            // 绘制传感器ID
            ctx.fillStyle = style.labelColor;
            ctx.font = `bold ${fontSize}px ${fontFamily}`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';

            // 添加文字阴影
            ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
            ctx.shadowBlur = 2;
            ctx.shadowOffsetX = 1;
            ctx.shadowOffsetY = 1;

            ctx.fillText(sensor.sensor_id, x, y + style.radius + 8);

            // 可选：绘制最后更新时间
            if (sensor.last_updated) {
                const timeText = new Date(sensor.last_updated).toLocaleTimeString();
                ctx.font = `10px ${fontFamily}`;
                ctx.fillText(timeText, x, y + style.radius + 25);
            }

            if (sensor.value) {
                const value = sensor.value.toFixed(4);
                ctx.font = `10px ${fontFamily}`;
                ctx.fillText(value, x, y + style.radius + 40);
            }
        }


        /**
         * 定时检查模拟结果是否生成完成
         */
        function timelyCheck() {
            const response = fetch(sessionApiUrl);
            response.then(async (response) => {
                if (!response.ok) {
                    throw new Error(`HTTP错误: ${response.status}`);
                }

                const resp = await response.json();
                console.log(resp)

                // Update runningDivOl
                runningDivOl.innerHTML = ''
                resp.files.map(f => {
                    let li = document.createElement('li')
                    li.innerText = f
                    runningDivOl.appendChild(li)
                })
                runningDivSpan.innerHTML = "模拟正在进行，请稍候 (session={{session}})"

                // 如果生成结果中不包含 'generated.gif'，则继续定时检查
                if (!resp.files.includes('generated.gif')) {
                    setTimeout(timelyCheck, 1000);
                } else {
                    // 结果生成完成，填充下拉选项
                    resp.files.forEach(file => {
                        if (file.endsWith('.png')) {
                            const option = document.createElement('option');
                            option.value = file;
                            option.text = file;
                            frameSelection.appendChild(option);
                        }
                    });

                    // Update running div and frameSelection stuff
                    runningDiv.style.display = 'none';
                    frameSelection.style.display = 'block';
                    frameSelectionSpan.innerHTML = '{{session}}';

                    // 绘制模拟结果
                    drawSimulationFrame()
                }

            });
        }

        /**
         * 绘制模拟结果的 frame 图层
         */
        function drawSimulationFrame() {
            const frame = frameSelection.value,
                url = sessionFrameApiUrl(frame),
                image = new Image(),
                canvas = document.getElementById('simulationCanvas'),
                { width, height } = canvas,
                ctx = canvas.getContext('2d');

            console.log(frame, url)

            image.src = url;

            image.onload = () => {
                ctx.drawImage(image, 0, 0, width, height)
                console.log('Simulation image loaded and drawn on canvas, image=', image);
                // 获取图像数据
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;

                let a = 0;
                for (let i = 0; i < data.length; i += 4) {
                    a += data[i];
                }

                // 处理每个像素
                for (let i = 0; i < data.length; i += 4) {
                    const r = data[i];      // 红色通道（灰度图中三个通道值相同）
                    const g = data[i + 1];  // 绿色通道
                    const b = data[i + 2];  // 蓝色通道
                    const a = data[i + 3];  // 透明度通道

                    // 计算灰度值（取平均值）
                    const gray = (r + g + b) / 3; // 255 - (r + g + b) / 3;

                    if (gray === 0) {
                        // 黑色像素：完全透明
                        data[i + 3] = 0;
                    } else {
                        // 非黑色像素：使用Reds配色方案
                        // 将灰度值映射到红色强度（0-255）
                        // 同时保持一定透明度以保留原始灰度层次
                        const redIntensity = Math.floor((gray / 255) * 255);

                        // 设置红色通道
                        data[i] = redIntensity;      // 红色
                        data[i + 1] = Math.floor(redIntensity * 0.1);  // 少量绿色
                        data[i + 2] = Math.floor(redIntensity * 0.1);  // 少量蓝色

                        // 根据灰度值设置透明度（越白越不透明）
                        data[i + 3] = Math.floor((gray / 255) * 255);
                    }
                }

                // 将处理后的图像数据放回画布
                ctx.putImageData(imageData, 0, 0);

                console.log('Simulation image loaded and drawn with red color scheme');
            }

        }

    </script>

    <!-- Draw the room -->
    <script>
        {
            // Start timely check
            timelyCheck()

            // Setup triggers
            frameSelection.onchange = () => {
                drawSimulationFrame()
            }

            const canvasRoom = document.createElement('canvas');
            canvasRoom.id = 'roomCanvas'
            room.appendChild(canvasRoom)

            const canvasOverlap = document.createElement('canvas');
            canvasOverlap.id = 'overlapCanvas'
            overlap.appendChild(canvasOverlap)

            const canvasSimulation = document.createElement('canvas');
            canvasSimulation.id = 'simulationCanvas'
            simulation.appendChild(canvasSimulation)

            function resizeCanvas() {
                let { offsetWidth: width, offsetHeight: height } = room;
                Object.assign(canvasRoom, { width, height })
                Object.assign(canvasOverlap, { width, height })
                Object.assign(canvasSimulation, { width, height })

                // 绘制房间
                drawRoom(canvasRoom);

                // 初始绘制 Sensors
                drawSensorsOnCanvas(
                    'latest_sensor_data',
                    canvasOverlap
                ).then(sensors => {
                    console.log(`绘制了 ${sensors.length} 个传感器`);
                });

            }
            resizeCanvas();

            // 定时更新 Sensors
            setInterval(() => {
                drawSensorsOnCanvas(
                    'latest_sensor_data',
                    canvasOverlap
                ).then(sensors => {
                    // console.log(`更新了 ${sensors.length} 个传感器`);
                });
            }, 5000); // 每5秒更新一次
        }
    </script>

</body>

</html>
